<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🐍 BORDER SNAKE · Free / Locked Modes</title>
  <style>
    * {
      user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, monospace;
      margin: 0;
      padding: 16px;
    }

    .game-container {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 64px;
      padding: 18px 16px 24px;
      box-shadow: 0 30px 40px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255,255,200,0.2);
      border: 1px solid rgba(255, 180, 100, 0.5);
      width: 100%;
      max-width: 650px;
      margin: auto;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 32px;
      box-shadow: 0 20px 30px -5px black, 0 0 0 3px #ffcf8a, 0 0 0 6px #2f2418;
      background-color: #0a201b;
      width: 100%;
      height: auto;
      cursor: pointer;
      touch-action: none;
    }

    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      margin-bottom: 14px;
      background: #0c1122cc;
      backdrop-filter: blur(16px);
      padding: 8px 16px;
      border-radius: 80px;
      gap: 10px;
      flex-wrap: wrap;
      border: 1px solid #ffbc70;
    }

    .score-box, .highscore-box {
      background: #00000077;
      padding: 4px 14px;
      border-radius: 60px;
      font-weight: bold;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .score-label {
      color: #ffda88;
      font-size: 0.7rem;
      text-transform: uppercase;
    }

    .score-value {
      color: #f5f0d7;
      font-size: 1.7rem;
      font-weight: 800;
      text-shadow: 0 0 6px #ffaa44;
      font-family: monospace;
    }

    .mode-toggle {
      background: #1e2a2fcc;
      border-radius: 60px;
      display: flex;
      gap: 4px;
      padding: 4px;
      backdrop-filter: blur(8px);
      border: 1px solid #ffbc70;
    }

    .mode-btn {
      background: transparent;
      border: none;
      padding: 6px 16px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 0.8rem;
      color: #ffddbb;
      cursor: pointer;
      transition: 0.1s;
      font-family: inherit;
    }

    .mode-btn.active {
      background: #ff8c42;
      color: #1e1a0c;
      box-shadow: 0 0 6px #ffaa55;
    }

    .restart-btn {
      background: linear-gradient(135deg, #ff9a3c, #ff5e00);
      border: none;
      font-weight: bold;
      font-size: 0.85rem;
      padding: 6px 18px;
      border-radius: 60px;
      color: #1f1c0c;
      cursor: pointer;
      transition: 0.07s linear;
      box-shadow: 0 4px 0 #9b3f00;
      transform: translateY(-2px);
    }

    .restart-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #9b3f00;
    }

    .joystick-area {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }

    .joystick-base {
      background: rgba(30, 35, 55, 0.85);
      backdrop-filter: blur(12px);
      width: 120px;
      height: 120px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffbf77;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    .joystick-thumb {
      width: 52px;
      height: 52px;
      background: radial-gradient(circle at 35% 35%, #ffcd94, #ff9626);
      border-radius: 999px;
      box-shadow: 0 0 0 3px #fdebb3, 0 6px 12px black;
      transition: transform 0.02s linear;
    }

    .gesture-hint {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
      font-size: 0.7rem;
      color: #ffcf9a;
      background: #00000066;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 5px 16px;
      border-radius: 60px;
    }

    .message {
      margin-top: 10px;
      font-size: 0.7rem;
      background: #000000aa;
      display: inline-block;
      padding: 5px 18px;
      border-radius: 60px;
      color: #ffdbb5;
    }

    .developer-credit {
      margin-top: 12px;
      font-size: 0.65rem;
      text-align: center;
      color: #ffcc88;
      background: #00000055;
      padding: 5px 12px;
      border-radius: 40px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }

    @keyframes pulse {
      0% { text-shadow: 0 0 0 #ffaa44; }
      100% { text-shadow: 0 0 10px #ffaa44; }
    }
    .score-value.highlight {
      animation: pulse 0.2s ease-out 2;
    }

    @media (max-width: 550px) {
      .joystick-base { width: 100px; height: 100px; }
      .joystick-thumb { width: 44px; height: 44px; }
      .score-value { font-size: 1.4rem; }
      .mode-btn { padding: 4px 12px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="game-wrapper">
    <canvas id="snakeCanvas" width="500" height="500"></canvas>

    <div class="info-panel">
      <div class="score-box"><span class="score-label">🍎 SCORE</span><span class="score-value" id="scoreDisplay">0</span></div>
      <div class="highscore-box"><span class="score-label">🏆 BEST</span><span class="score-value" id="highScoreDisplay">0</span></div>
      <div class="mode-toggle" id="modeToggle">
        <button class="mode-btn" data-mode="locked">🔒 Locked Border</button>
        <button class="mode-btn" data-mode="free">🌊 Free Border</button>
      </div>
      <button class="restart-btn" id="restartButton">🐍 NEW</button>
    </div>

    <div class="joystick-area">
      <div id="joystickBase" class="joystick-base">
        <div id="joystickThumb" class="joystick-thumb"></div>
      </div>
    </div>
    <div class="gesture-hint">
      <span>🕹️ Drag joystick</span> <span>👆 Swipe on game</span>
    </div>
    <div class="message" id="statusMessage">🎮 Choose border mode & play!</div>
    <div class="developer-credit">
      Developed by <strong>Edrees Amin Aryan</strong> ✨ | Border: <span id="modeIndicator">Locked</span>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- SNAKE WITH DUAL BORDER MODES (FREE / LOCKED) ----------
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');
    const GRID_SIZE = 20;        // 20x20 virtual grid
    let CELL_SIZE = canvas.width / GRID_SIZE;
    
    // Game state
    let snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    let direction = 'RIGHT';
    let nextDirection = 'RIGHT';
    let food = { x: 15, y: 10 };
    let score = 0;
    let highScore = 0;
    let gameLoop = null;
    let gameRunning = false;
    let gameSpeed = 135;
    
    // BORDER MODE: 'locked' (wall death) or 'free' (wrap around)
    let borderMode = 'locked';   // default locked
    
    // Load highscore & mode preference
    try {
      const savedHigh = localStorage.getItem('snakeBorderHigh');
      if(savedHigh && !isNaN(parseInt(savedHigh))) {
        highScore = parseInt(savedHigh);
        document.getElementById('highScoreDisplay').innerText = highScore;
      }
      const savedMode = localStorage.getItem('snakeBorderMode');
      if(savedMode === 'free' || savedMode === 'locked') borderMode = savedMode;
    } catch(e) {}
    
    // UI elements
    const modeBtns = document.querySelectorAll('.mode-btn');
    const modeIndicatorSpan = document.getElementById('modeIndicator');
    
    function updateModeUI() {
      modeBtns.forEach(btn => {
        const mode = btn.getAttribute('data-mode');
        if(mode === borderMode) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      modeIndicatorSpan.innerText = (borderMode === 'locked') ? 'Locked (Wall)' : 'Free (Wrap)';
      localStorage.setItem('snakeBorderMode', borderMode);
    }
    
    // ----- COLORFUL RAINBOW RENDER -----
    function getBodyColor(idx, total) {
      const hue = ( (idx * 14) + (Date.now() * 0.022) ) % 360;
      return `hsl(${hue}, 88%, 58%)`;
    }
    function getHeadColor() {
      const hue = (Date.now() * 0.01) % 360;
      return `hsl(${hue}, 92%, 68%)`;
    }
    
    function drawFood(ctx, x, y) {
      const cx = x * CELL_SIZE + CELL_SIZE/2;
      const cy = y * CELL_SIZE + CELL_SIZE/2;
      const rad = CELL_SIZE * 0.38;
      const grad = ctx.createRadialGradient(cx-3, cy-3, 3, cx, cy, rad+2);
      grad.addColorStop(0, '#ff7b9c');
      grad.addColorStop(0.7, '#ff2040');
      grad.addColorStop(1, '#b00020');
      ctx.beginPath();
      ctx.arc(cx, cy, rad, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ff8866';
      ctx.beginPath();
      ctx.arc(cx-3, cy-3, 4, 0, Math.PI*2);
      ctx.fillStyle = '#fff3bf';
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(cx+6, cy-2);
      ctx.lineTo(cx+9, cy-5);
      ctx.lineTo(cx+12, cy-2);
      ctx.fillStyle = '#ffdd88';
      ctx.fill();
    }
    
    function drawGrid() {
      ctx.strokeStyle = '#3d5a6c';
      ctx.lineWidth = 0.7;
      for(let i = 0; i <= GRID_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, canvas.height);
        ctx.stroke();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(canvas.width, i * CELL_SIZE);
        ctx.stroke();
      }
    }
    
    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      grad.addColorStop(0, '#071620');
      grad.addColorStop(1, '#102433');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for(let i = 0; i < 180; i++) {
        ctx.fillStyle = `rgba(255,210,110,${Math.random() * 0.3})`;
        ctx.beginPath();
        ctx.arc( (i*211)%canvas.width, (i*97)%canvas.height, 1.2, 0, Math.PI*2);
        ctx.fill();
      }
    }
    
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2*r) r = w/2;
        if (h < 2*r) r = h/2;
        this.moveTo(x+r, y);
        this.lineTo(x+w-r, y);
        this.quadraticCurveTo(x+w, y, x+w, y+r);
        this.lineTo(x+w, y+h-r);
        this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        this.lineTo(x+r, y+h);
        this.quadraticCurveTo(x, y+h, x, y+h-r);
        this.lineTo(x, y+r);
        this.quadraticCurveTo(x, y, x+r, y);
        return this;
      };
    }
    
    function drawSnake() {
      for(let i = 0; i < snake.length; i++) {
        const seg = snake[i];
        const x = seg.x * CELL_SIZE;
        const y = seg.y * CELL_SIZE;
        const margin = 2;
        const w = CELL_SIZE - margin*2;
        const radius = 7;
        const fillColor = i === 0 ? getHeadColor() : getBodyColor(i, snake.length);
        ctx.shadowBlur = i === 0 ? 10 : 5;
        ctx.shadowColor = '#ffaa66';
        ctx.fillStyle = fillColor;
        ctx.beginPath();
        ctx.roundRect(x+margin, y+margin, w, w, radius);
        ctx.fill();
        if(i === 0) {
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.arc(x+CELL_SIZE-8, y+CELL_SIZE-8, 3.5, 0, Math.PI*2);
          ctx.arc(x+8, y+CELL_SIZE-8, 3.5, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = "#0a0c1c";
          ctx.beginPath();
          ctx.arc(x+CELL_SIZE-9, y+CELL_SIZE-7, 1.8, 0, Math.PI*2);
          ctx.arc(x+7, y+CELL_SIZE-7, 1.8, 0, Math.PI*2);
          ctx.fill();
        } else {
          ctx.fillStyle = "rgba(255,245,180,0.5)";
          ctx.beginPath();
          ctx.arc(x+CELL_SIZE-8, y+8, 2.6, 0, Math.PI*2);
          ctx.fill();
        }
      }
      ctx.shadowBlur = 0;
    }
    
    function render() {
      drawBackground();
      drawGrid();
      drawFood(ctx, food.x, food.y);
      drawSnake();
    }
    
    // ----- BORDER DEPENDENT MOVEMENT VALIDATION -----
    function isOutOfBounds(head) {
      if(borderMode === 'locked') {
        return (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE);
      } else { // free mode: wrap around
        return false; // wrap handled separately
      }
    }
    
    function applyWrap(head) {
      if(borderMode === 'free') {
        let newHead = { ...head };
        if(newHead.x < 0) newHead.x = GRID_SIZE - 1;
        if(newHead.x >= GRID_SIZE) newHead.x = 0;
        if(newHead.y < 0) newHead.y = GRID_SIZE - 1;
        if(newHead.y >= GRID_SIZE) newHead.y = 0;
        return newHead;
      }
      return head;
    }
    
    function generateValidFood() {
      for(let attempt = 0; attempt < 3000; attempt++) {
        const randX = Math.floor(Math.random() * GRID_SIZE);
        const randY = Math.floor(Math.random() * GRID_SIZE);
        if(!snake.some(seg => seg.x === randX && seg.y === randY)) {
          food = { x: randX, y: randY };
          return;
        }
      }
      for(let y = 0; y < GRID_SIZE; y++) {
        for(let x = 0; x < GRID_SIZE; x++) {
          if(!snake.some(s => s.x === x && s.y === y)) {
            food = { x, y };
            return;
          }
        }
      }
      gameWin();
    }
    
    function updateScoreUI() {
      const span = document.getElementById('scoreDisplay');
      span.innerText = score;
      span.classList.add('highlight');
      setTimeout(() => span.classList.remove('highlight'), 150);
    }
    
    function gameTick() {
      if(!gameRunning) return;
      direction = nextDirection;
      let newHead = { ...snake[0] };
      switch(direction) {
        case 'RIGHT': newHead.x += 1; break;
        case 'LEFT': newHead.x -= 1; break;
        case 'UP': newHead.y -= 1; break;
        case 'DOWN': newHead.y += 1; break;
      }
      
      // Handle wrap in free mode BEFORE collision detection
      let wrappedHead = applyWrap(newHead);
      const willEat = (wrappedHead.x === food.x && wrappedHead.y === food.y);
      
      if(willEat) {
        // growth: add wrapped head
        snake.unshift(wrappedHead);
        score++;
        updateScoreUI();
        if(score > highScore) {
          highScore = score;
          document.getElementById('highScoreDisplay').innerText = highScore;
          localStorage.setItem('snakeBorderHigh', highScore);
          const hsElem = document.getElementById('highScoreDisplay');
          hsElem.classList.add('highlight');
          setTimeout(() => hsElem.classList.remove('highlight'), 300);
        }
        generateValidFood();
        if(score % 5 === 0 && gameSpeed > 70) {
          clearInterval(gameLoop);
          gameSpeed = Math.max(70, gameSpeed - 5);
          gameLoop = setInterval(gameTick, gameSpeed);
        }
      } else {
        snake.unshift(wrappedHead);
        snake.pop();
      }
      
      const head = snake[0];
      
      // Wall collision (only for locked mode)
      if(borderMode === 'locked') {
        if(head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
          gameOver();
          return;
        }
      }
      
      // Self collision (always lethal)
      for(let i = 1; i < snake.length; i++) {
        if(snake[i].x === head.x && snake[i].y === head.y) {
          gameOver();
          return;
        }
      }
      
      render();
    }
    
    function gameOver() {
      if(!gameRunning) return;
      gameRunning = false;
      if(gameLoop) clearInterval(gameLoop);
      gameLoop = null;
      document.getElementById('statusMessage').innerHTML = `💀 GAME OVER · Score: ${score} · Tap NEW or move`;
      render();
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = '#2a0808';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }
    
    function gameWin() {
      if(gameLoop) clearInterval(gameLoop);
      gameRunning = false;
      document.getElementById('statusMessage').innerHTML = `🏆 PERFECT WIN! 🏆 Score: ${score}`;
      render();
      ctx.font = "bold 17px monospace";
      ctx.fillStyle = "#FFE484";
      ctx.fillText("✨ MASTER SNAKE ✨", canvas.width/2-95, canvas.height/2);
    }
    
    function initGame(resetSpeed = true) {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = 'RIGHT';
      nextDirection = 'RIGHT';
      score = 0;
      if(resetSpeed) gameSpeed = 135;
      updateScoreUI();
      gameRunning = true;
      const modeText = borderMode === 'locked' ? 'Locked Border (walls)' : 'Free Border (wrap)';
      document.getElementById('statusMessage').innerHTML = `🌈 ${modeText} · use joystick/swipe`;
      generateValidFood();
      if(gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(gameTick, gameSpeed);
      render();
    }
    
    function restartGame() {
      if(gameLoop) clearInterval(gameLoop);
      initGame(true);
    }
    
    // ----- Direction Control (safe) -----
    function requestDirection(newDir) {
      if(!gameRunning) {
        restartGame();
        return;
      }
      if((newDir === 'RIGHT' && direction !== 'LEFT') ||
         (newDir === 'LEFT' && direction !== 'RIGHT') ||
         (newDir === 'UP' && direction !== 'DOWN') ||
         (newDir === 'DOWN' && direction !== 'UP')) {
        nextDirection = newDir;
      }
    }
    
    // ---------- JOYSTICK LOGIC ----------
    const joystickBase = document.getElementById('joystickBase');
    const joystickThumb = document.getElementById('joystickThumb');
    let activeTouchId = null;
    let baseRect = null;
    const maxDist = 42;
    
    function updateJoystickFromPos(clientX, clientY) {
      if(!baseRect) return;
      const baseX = baseRect.left + baseRect.width/2;
      const baseY = baseRect.top + baseRect.height/2;
      let dx = clientX - baseX;
      let dy = clientY - baseY;
      const distance = Math.min(maxDist, Math.hypot(dx, dy));
      const angle = Math.atan2(dy, dx);
      let limitedX = Math.cos(angle) * distance;
      let limitedY = Math.sin(angle) * distance;
      joystickThumb.style.transform = `translate(${limitedX}px, ${limitedY}px)`;
      if(distance > 14) {
        const absX = Math.abs(limitedX);
        const absY = Math.abs(limitedY);
        if(absX > absY) {
          if(limitedX > 0) requestDirection('RIGHT');
          else requestDirection('LEFT');
        } else {
          if(limitedY > 0) requestDirection('DOWN');
          else requestDirection('UP');
        }
      }
    }
    
    function resetJoystick() { joystickThumb.style.transform = `translate(0px, 0px)`; }
    
    function handleTouchStart(e) {
      e.preventDefault();
      if(activeTouchId !== null) return;
      const touch = e.touches[0];
      activeTouchId = touch.identifier;
      baseRect = joystickBase.getBoundingClientRect();
      updateJoystickFromPos(touch.clientX, touch.clientY);
    }
    function handleTouchMove(e) {
      e.preventDefault();
      if(activeTouchId === null) return;
      for(let i = 0; i < e.touches.length; i++) {
        if(e.touches[i].identifier === activeTouchId) {
          updateJoystickFromPos(e.touches[i].clientX, e.touches[i].clientY);
          break;
        }
      }
    }
    function handleTouchEnd(e) {
      e.preventDefault();
      activeTouchId = null;
      resetJoystick();
    }
    joystickBase.addEventListener('touchstart', handleTouchStart, {passive: false});
    joystickBase.addEventListener('touchmove', handleTouchMove, {passive: false});
    joystickBase.addEventListener('touchend', handleTouchEnd);
    joystickBase.addEventListener('touchcancel', handleTouchEnd);
    
    // mouse fallback for debugging
    let mouseActive = false;
    joystickBase.addEventListener('mousedown', (e) => {
      e.preventDefault();
      mouseActive = true;
      baseRect = joystickBase.getBoundingClientRect();
      updateJoystickFromPos(e.clientX, e.clientY);
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
    });
    function onMouseMove(e) { if(mouseActive) updateJoystickFromPos(e.clientX, e.clientY); }
    function onMouseUp(e) { mouseActive = false; resetJoystick(); window.removeEventListener('mousemove', onMouseMove); window.removeEventListener('mouseup', onMouseUp); }
    
    // Swipe gestures on canvas
    let swipeStart = null;
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      swipeStart = { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
    });
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      if(!swipeStart) return;
      const rect = canvas.getBoundingClientRect();
      const endX = e.changedTouches[0].clientX - rect.left;
      const endY = e.changedTouches[0].clientY - rect.top;
      const dx = endX - swipeStart.x;
      const dy = endY - swipeStart.y;
      if(Math.abs(dx) < 15 && Math.abs(dy) < 15) { swipeStart = null; return; }
      if(Math.abs(dx) > Math.abs(dy)) {
        if(dx > 0) requestDirection('RIGHT');
        else requestDirection('LEFT');
      } else {
        if(dy > 0) requestDirection('DOWN');
        else requestDirection('UP');
      }
      swipeStart = null;
    });
    canvas.addEventListener('touchcancel', () => { swipeStart = null; });
    
    // keyboard support (optional)
    window.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
        let dir = null;
        if(e.key === 'ArrowRight') dir = 'RIGHT';
        if(e.key === 'ArrowLeft') dir = 'LEFT';
        if(e.key === 'ArrowUp') dir = 'UP';
        if(e.key === 'ArrowDown') dir = 'DOWN';
        if(dir) requestDirection(dir);
      }
    });
    
    // Mode switching
    function setBorderMode(mode) {
      if(mode !== 'locked' && mode !== 'free') return;
      borderMode = mode;
      updateModeUI();
      if(gameRunning) {
        // restart game to apply new border mode cleanly
        restartGame();
      } else {
        // just redraw idle
        idleSetup();
        render();
      }
    }
    
    modeBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const mode = btn.getAttribute('data-mode');
        setBorderMode(mode);
      });
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const mode = btn.getAttribute('data-mode');
        setBorderMode(mode);
      });
    });
    
    const restartBtn = document.getElementById('restartButton');
    restartBtn.addEventListener('click', () => restartGame());
    restartBtn.addEventListener('touchstart', (e) => { e.preventDefault(); restartGame(); });
    
    function idleSetup() {
      gameRunning = false;
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = 'RIGHT';
      nextDirection = 'RIGHT';
      food = { x: 15, y: 10 };
      score = 0;
      updateScoreUI();
      render();
      document.getElementById('statusMessage').innerHTML = `🎮 Mode: ${borderMode === 'locked' ? '🔒 Locked Border' : '🌊 Free Wrap'} · Play!`;
    }
    
    idleSetup();
    updateModeUI();
    window.addEventListener('resize', () => {
      CELL_SIZE = canvas.width / GRID_SIZE;
      render();
    });
    CELL_SIZE = canvas.width / GRID_SIZE;
  })();
</script>
</body>
</html>
